<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЛР18 — Интернет-магазин электроники</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        
        h2 {
            margin: 20px 0 10px;
            color: #444;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
        }
        
        /* Форма */
        .form-section {
            background: #fff;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        form label {
            display: block;
            margin-top: 10px;
        }
        
        form input, form select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            max-width: 300px;
        }
        
        form input[type="radio"], form input[type="checkbox"] {
            width: auto;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        button.danger {
            background: #dc3545;
        }
        
        button.danger:hover {
            background: #c82333;
        }
        
        button.success {
            background: #28a745;
        }
        
        button.success:hover {
            background: #218838;
        }
        
        /* Каталог товаров */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .product-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .product-card .category {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .product-card .price {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .product-card .rating {
            color: #ffc107;
            margin-bottom: 10px;
        }
        
        .product-card .stock {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .product-card button {
            width: 100%;
            margin-top: 10px;
        }
        
        /* Корзина */
        .cart-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .cart-item-info {
            flex: 2;
        }
        
        .cart-item-title {
            font-weight: bold;
            color: #333;
        }
        
        .cart-item-price {
            color: #28a745;
            margin-left: 10px;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 20px;
        }
        
        .cart-item-quantity input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .cart-item-total {
            font-weight: bold;
            min-width: 100px;
            text-align: right;
        }
        
        .cart-remove {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .cart-remove:hover {
            background: #c82333;
        }
        
        .cart-summary {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 4px;
            text-align: right;
        }
        
        .cart-total {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        
        /* Информационные панели */
        .info-panel {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .storage-tabs {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }
        
        .storage-tab {
            padding: 8px 15px;
            background: #ddd;
            border: none;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
        }
        
        .storage-tab.active {
            background: #e3f2fd;
            font-weight: bold;
        }
        
        pre {
            background: #eee;
            padding: 10px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Лабораторная работа №18</h1>
        <h2>Интернет-магазин электроники с корзиной</h2>
        
        <!-- Секция формы пользователя -->
        <div class="form-section">
            <h3>Данные пользователя</h3>
            <form id="userForm">
                <label>
                    ФИО:
                    <input type="text" id="name" required minlength="3">
                </label>

                <label>
                    Email:
                    <input type="email" id="email" required>
                </label>

                <label>Пол:</label>
                <label><input type="radio" name="gender" value="Мужской" required> Мужской</label>
                <label><input type="radio" name="gender" value="Женский"> Женский</label>

                <label>
                    <input type="checkbox" id="agree"> Согласен с условиями
                </label>

                <label>
                    Группа:
                    <select id="group">
                        <option value="ИП-5">ИП-5</option>
                        <option value="ИП-6">ИП-6</option>
                        <option value="ИП-7">ИП-7</option>
                    </select>
                </label>

                <div class="button-group">
                    <button type="submit">Сохранить профиль</button>
                    <button type="button" id="loadProfile">Загрузить профиль</button>
                    <button type="button" id="clearProfile" class="danger">Очистить профиль</button>
                </div>
            </form>
        </div>

        <!-- Каталог товаров -->
        <h2>Каталог товаров</h2>
        <div id="catalog" class="catalog"></div>

        <!-- Корзина -->
        <div class="cart-section">
            <h2>Корзина</h2>
            <div id="cart"></div>
            <div class="cart-summary">
                <div id="cartSummary"></div>
            </div>
            <div class="button-group">
                <button type="button" id="checkout" class="success">Оформить заказ</button>
                <button type="button" id="clearCart" class="danger">Очистить корзину</button>
            </div>
        </div>

        <!-- Информационные панели -->
        <div class="storage-tabs">
            <button class="storage-tab active" onclick="showStorage('profile')">Профиль</button>
            <button class="storage-tab" onclick="showStorage('cart')">Корзина</button>
            <button class="storage-tab" onclick="showStorage('cookies')">Cookies</button>
            <button class="storage-tab" onclick="showStorage('all')">Все данные</button>
        </div>
        
        <div id="output" class="info-panel"></div>
    </div>

    <script>
        // ========== JSON ДАННЫЕ ТОВАРОВ ==========
        const productsData = {
            "products": [
                {
                    "id": 1,
                    "name": "Ноутбук ASUS ROG Strix",
                    "category": "Ноутбуки",
                    "price": 89990,

                {

                },
                {

                },
                {

                    "category": "Периферия",
                    "price": 12990,

                }
            ]
        };

        // ========== КЛАСС ДЛЯ РАБОТЫ С КОРЗИНОЙ ==========
        class ShoppingCart {
            constructor() {
                this.items = this.loadFromStorage();
            }

            loadFromStorage() {
                const saved = localStorage.getItem('cart');
                return saved ? JSON.parse(saved) : [];
            }

            saveToStorage() {
                localStorage.setItem('cart', JSON.stringify(this.items));
                this.saveToCookies();
                this.updateDisplay();
            }

            saveToCookies() {
                const cartData = JSON.stringify(this.items);
                document.cookie = "cart=" + encodeURIComponent(cartData) + ";path=/;max-age=604800";
            }

            addItem(product, quantity = 1) {
                const existing = this.items.find(item => item.id === product.id);
                if (existing) {
                    existing.quantity += quantity;
                } else {
                    this.items.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        quantity: quantity
                    });
                }
                this.saveToStorage();
            }

            removeItem(productId) {
                this.items = this.items.filter(item => item.id !== productId);
                this.saveToStorage();
            }

            updateQuantity(productId, quantity) {
                const item = this.items.find(item => item.id === productId);
                if (item) {
                    if (quantity <= 0) {
                        this.removeItem(productId);
                    } else {
                        item.quantity = quantity;
                        this.saveToStorage();
                    }
                }
            }

            clear() {
                this.items = [];
                this.saveToStorage();
            }

            getTotal() {
                return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            getCount() {
                return this.items.reduce((sum, item) => sum + item.quantity, 0);
            }

            updateDisplay() {
                const cartDiv = document.getElementById('cart');
                const summaryDiv = document.getElementById('cartSummary');
                
                if (this.items.length === 0) {
                    cartDiv.innerHTML = '<p style="text-align: center; color: #666;">Корзина пуста</p>';
                    summaryDiv.innerHTML = '<span class="cart-total">0 ₽</span>';
                    return;
                }

                let cartHtml = '';
                this.items.forEach(item => {
                    cartHtml += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <span class="cart-item-title">${item.name}</span>
                                <span class="cart-item-price">${item.price.toLocaleString()} ₽</span>
                            </div>
                            <div class="cart-item-quantity">
                                <button onclick="cart.updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <input type="number" value="${item.quantity}" min="1" 
                                       onchange="cart.updateQuantity(${item.id}, parseInt(this.value))">
                                <button onclick="cart.updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                            <div class="cart-item-total">
                                ${(item.price * item.quantity).toLocaleString()} ₽
                            </div>
                            <button class="cart-remove" onclick="cart.removeItem(${item.id})">×</button>
                        </div>
                    `;
                });

                cartDiv.innerHTML = cartHtml;
                summaryDiv.innerHTML = `
                    <div>Товаров: ${this.getCount()}</div>
                    <span class="cart-total">Итого: ${this.getTotal().toLocaleString()} ₽</span>
                `;
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const cart = new ShoppingCart();
        const form = document.getElementById("userForm");
        const output = document.getElementById("output");

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С ХРАНИЛИЩАМИ ==========
        function setCookie(name, value, days = 7) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + date.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [cookieName, cookieValue] = cookie.trim().split('=');
                if (cookieName === name) {
                    return decodeURIComponent(cookieValue);
                }
            }
            return null;
        }

        function deleteCookie(name) {
            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }

        // ========== ОТОБРАЖЕНИЕ КАТАЛОГА ==========
        function displayCatalog() {
            const catalogDiv = document.getElementById('catalog');
            catalogDiv.innerHTML = productsData.products.map(product => `
                <div class="product-card">
                    <h3>${product.name}</h3>
                    <div class="category">${product.category}</div>
                    <div class="price">${product.price.toLocaleString()} ₽</div>
                    <div class="rating">${'★'.repeat(Math.floor(product.rating))}${product.rating % 1 ? '½' : ''}</div>
                    <div class="stock">В наличии: ${product.stock}</div>
                    <p>${product.description}</p>
                    <button onclick="cart.addItem(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                        В корзину
                    </button>
                </div>
            `).join('');
        }

        // ========== ФУНКЦИИ ДЛЯ ПРОФИЛЯ ==========
        function saveProfile(formData) {
            // Сохраняем в localStorage
            localStorage.setItem('userProfile', JSON.stringify(formData));
            
            // Сохраняем в cookies
            setCookie('userProfile', JSON.stringify(formData));
            
            showOutput(formData);
            showStorage('profile');
        }

        function loadProfile() {
            const saved = localStorage.getItem('userProfile');
            if (saved) {
                try {
                    const formData = JSON.parse(saved);
                    document.getElementById("name").value = formData.name || "";
                    document.getElementById("email").value = formData.email || "";
                    document.getElementById("group").value = formData.group || "ИП-5";
                    
                    if (formData.gender) {
                        const genderRadios = document.querySelectorAll('input[name="gender"]');
                        genderRadios.forEach(radio => {
                            if (radio.value === formData.gender) {
                                radio.checked = true;
                            }
                        });
                    }
                    
                    document.getElementById("agree").checked = formData.agree || false;
                    
                    alert("✅ Профиль загружен");
                    showOutput(formData);
                } catch (e) {
                    alert("❌ Ошибка загрузки профиля");
                }
            } else {
                alert("❌ Профиль не найден");
            }
        }

        function clearProfile() {
            localStorage.removeItem('userProfile');
            deleteCookie('userProfile');
            document.getElementById("userForm").reset();
            alert("🧹 Профиль очищен");
            showStorage('profile');
        }

        // ========== ОФОРМЛЕНИЕ ЗАКАЗА ==========
        function checkout() {
            if (cart.items.length === 0) {
                alert("Корзина пуста!");
                return;
            }

            const profile = localStorage.getItem('userProfile');
            if (!profile) {
                alert("Сначала заполните профиль!");
                return;
            }

            const userData = JSON.parse(profile);
            
            // Создаем заказ
            const order = {
                orderId: Date.now(),
                user: userData,
                items: cart.items,
                total: cart.getTotal(),
                date: new Date().toISOString()
            };

            // Сохраняем заказ
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            // Очищаем корзину
            cart.clear();
            
            alert(`✅ Заказ №${order.orderId} оформлен!\nСумма: ${order.total.toLocaleString()} ₽`);
        }

        // ========== ОТОБРАЖЕНИЕ ИНФОРМАЦИИ ==========
        function showOutput(formData) {
            output.textContent =
`=== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ===
ФИО: ${formData.name}
Email: ${formData.email}
Пол: ${formData.gender}
Группа: ${formData.group}
Согласие: ${formData.agree ? "Да" : "Нет"}

--- Работа с RegExp и String ---`;

            // test()
            const hasNumber = /\d/.test(formData.name);

            // exec()
            const emailReg = /^[\w.-]+@[\w.-]+\.[a-z]{2,}$/i;
            const execResult = emailReg.exec(formData.email);

            // match()
            const matchResult = formData.email.match(/@\w+/);

            // search()
            const searchResult = formData.email.search("@");

            // replace()
            const hiddenEmail = formData.email.replace(/@.+/, "@***");

            // split()
            const nameParts = formData.name.split(" ");

            output.textContent += `
Есть цифры в ФИО: ${hasNumber}
exec(): ${execResult ? execResult[0] : 'нет совпадений'}
match(): ${matchResult ? matchResult[0] : 'нет совпадений'}
search(): ${searchResult}
replace(): ${hiddenEmail}
split(): ${nameParts.join(' | ')}`;
        }

        function showStorage(type) {
            // Обновляем активную вкладку
            document.querySelectorAll('.storage-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            let info = "=== СОСТОЯНИЕ ХРАНИЛИЩ ===\n\n";

            if (type === 'profile' || type === 'all') {
                info += "--- LOCALSTORAGE (Профиль) ---\n";
                const profile = localStorage.getItem('userProfile');
                info += profile ? `✅ Профиль: ${profile}\n` : "❌ Профиль не найден\n";
                
                info += "\n--- COOKIES (Профиль) ---\n";
                const cookieProfile = getCookie('userProfile');
                info += cookieProfile ? `✅ Профиль: ${cookieProfile}\n` : "❌ Профиль не найден\n";
            }

            if (type === 'cart' || type === 'all') {
                info += "\n--- LOCALSTORAGE (Корзина) ---\n";
                const cartData = localStorage.getItem('cart');
                if (cartData) {
                    const items = JSON.parse(cartData);
                    info += `✅ Товаров в корзине: ${items.length}\n`;
                    items.forEach(item => {
                        info += `   • ${item.name} x${item.quantity} = ${(item.price * item.quantity).toLocaleString()} ₽\n`;
                    });
                    info += `   Итого: ${cart.getTotal().toLocaleString()} ₽\n`;
                } else {
                    info += "❌ Корзина пуста\n";
                }
            }

            if (type === 'cookies' || type === 'all') {
                info += "\n--- ВСЕ COOKIES ---\n";
                if (document.cookie === "") {
                    info += "❌ Cookies не найдены\n";
                } else {
                    const cookies = document.cookie.split(';');
                    cookies.forEach(cookie => {
                        const [name, value] = cookie.trim().split('=');
                        info += `✅ ${name} = ${decodeURIComponent(value)}\n`;
                    });
                }
            }

            if (type === 'all') {
                info += "\n--- JSON КАТАЛОГ ---\n";
                info += `✅ Загружено товаров: ${productsData.products.length}\n`;
                info += `   Категории: ${[...new Set(productsData.products.map(p => p.category))].join(', ')}\n`;
                
                info += "\n--- ИСТОРИЯ ЗАКАЗОВ ---\n";
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                if (orders.length > 0) {
                    orders.forEach(order => {
                        info += `✅ Заказ #${order.orderId}: ${order.total.toLocaleString()} ₽ (${new Date(order.date).toLocaleString()})\n`;
                    });
                } else {
                    info += "❌ Заказов нет\n";
                }
            }

            output.textContent = info;
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const group = document.getElementById("group").value;
            const agree = document.getElementById("agree").checked;
            const gender = document.querySelector('input[name="gender"]:checked')?.value;

            // Валидация
            if (!name || !email || !gender) {
                alert("Заполните все обязательные поля");
                return;
            }

            const emailReg = /^[\w.-]+@[\w.-]+\.[a-z]{2,}$/i;
            if (!emailReg.test(email)) {
                alert("Некорректный email");
                return;
            }

            if (!agree) {
                alert("Необходимо согласие с условиями");
                return;
            }

            const formData = {
                name: name,
                email: email,
                gender: gender,
                group: group,
                agree: agree,
                timestamp: new Date().toISOString()
            };

            saveProfile(formData);
        });

        document.getElementById("loadProfile").addEventListener("click", loadProfile);
        document.getElementById("clearProfile").addEventListener("click", clearProfile);
        document.getElementById("checkout").addEventListener("click", checkout);
        document.getElementById("clearCart").addEventListener("click", () => {
            if (confirm("Очистить корзину?")) {
                cart.clear();
            }
        });

        // ========== ЗАПУСК ==========
        displayCatalog();
        cart.updateDisplay();
        showStorage('profile');

        // Загружаем профиль при старте, если есть
        window.addEventListener("load", function() {
            const savedProfile = localStorage.getItem('userProfile');
            if (savedProfile) {
                if (confirm("Найден сохраненный профиль. Загрузить?")) {
                    loadProfile();
                }
            }
        });
    </script>
</body>
</html>
